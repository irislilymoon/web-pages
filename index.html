<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>你好，世界 | Hello World 经典页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 优雅的渐变背景：浅灰蓝 -> 淡紫雾霭，现代感十足 */
            background: linear-gradient(135deg, #f0f4ff 0%, #e6e9fc 50%, #f9f0ff 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            /* 平滑背景滚动（保留视觉效果） */
            position: relative;
        }

        /* 装饰性光晕背景元素（增加层次感） */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 255, 255, 0.5) 0%, rgba(220, 230, 255, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片容器 */
        .hello-card {
            position: relative;
            z-index: 2;
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(0px);
            border-radius: 3rem;
            padding: 2.8rem 2rem;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 4px 12px rgba(0, 0, 0, 0.05);
            transition: transform 0.25s ease, box-shadow 0.35s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* 悬浮时卡片轻微上扬 + 阴影加深，灵动但不夸张 */
        .hello-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.96);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s;
        }

        /* 地球/世界 图标装饰，活泼开场 */
        .world-icon {
            font-size: 4.2rem;
            line-height: 1;
            margin-bottom: 0.75rem;
            display: inline-block;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.08));
            animation: subtle-float 3s ease-in-out infinite;
        }

        /* 轻微浮动动画，增加生命力 */
        @keyframes subtle-float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        /* 主标题: 渐变文字 + 大气粗细 */
        .glow-text {
            font-size: clamp(3rem, 10vw, 5.6rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0.5rem 0 0.75rem 0;
            background: linear-gradient(125deg, #1f2b5c, #4a3b7c, #2266cc, #3b82f6);
            background-size: 180% 180%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
            transition: background-position 0.5s ease;
        }

        /* 增加渐变流动的细腻感 */
        .glow-text:hover {
            background-position: 100% 0%;
        }

        /* 温暖的描述文字 */
        .description {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #2c3e4e;
            margin: 1rem 0 1.5rem 0;
            font-weight: 450;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.85;
        }

        /* 优雅的分隔装饰 */
        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #8b9eff, #a97cff, #6c9eff);
            border-radius: 3px;
            margin: 1.2rem auto 1.4rem auto;
        }

        /* 趣味小标签区块，展示编程世界的情怀 */
        .code-snippet {
            background: #f1f4fa;
            border-radius: 2rem;
            padding: 0.9rem 1.2rem;
            margin: 1.8rem 0.5rem 0.5rem;
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            font-size: 0.85rem;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            border: 1px solid #e2e8f0;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }

        .code-snippet span {
            background: #ffffffd9;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #2d3e6e;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            letter-spacing: 0.3px;
        }

        .code-snippet span i {
            font-style: normal;
            font-weight: 600;
            color: #2266cc;
        }

        /* 底部优雅脚注 */
        .footer-note {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #6f7c8f;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(128, 128, 160, 0.2);
            padding-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-note p {
            opacity: 0.7;
        }

        .footer-note .heart {
            color: #d46b8c;
            font-weight: 500;
        }

        /* 响应式细节：让移动端内边距舒适 */
        @media (max-width: 560px) {
            .hello-card {
                padding: 2rem 1.5rem;
                border-radius: 2rem;
            }
            .description {
                font-size: 1rem;
                max-width: 100%;
            }
            .code-snippet span {
                font-size: 0.7rem;
                padding: 0.2rem 0.7rem;
            }
            .world-icon {
                font-size: 3.2rem;
            }
        }

        /* 入口淡入动画（初次加载轻盈感） */
        @keyframes cardFadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hello-card {
            animation: cardFadeUp 0.65s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        /* 添加些微交互点缀 */
        .hello-card:active {
            transform: scale(0.98);
            transition: transform 0.1s;
        }
    </style>
</head>
<body>
    <div class="hello-card">
        <!-- 具象化“世界”元素 地球仪 + 热情问候 -->
        <div class="world-icon" aria-label="地球图标">🌍✨</div>
        
        <!-- 核心标题：惊艳渐变 Hello, World! -->
        <h1 class="glow-text">Hello, World!</h1>
        
        <!-- 优雅分隔强化视觉 -->
        <div class="divider"></div>
        
        <!-- 副文本：温暖且鼓舞人心 -->
        <p class="description">
            每一次「你好，世界」都是一段奇妙旅程的开始。<br>
            创造、探索、连接 —— 欢迎来到属于你的数字宇宙。
        </p>
        
        <!-- 趣味代码片：多种语言中 'Hello World' 的温馨映射，呼应技术情怀 -->
        <div class="code-snippet">
            <span>📟 <i>console</i>.log("<span style="color:#2c6e9e;">Hello World</span>")</span>
            <span>🐍 <i>print</i>("<span style="color:#2c6e9e;">Hello World</span>")</span>
            <span>☕ <i>System.out</i>.println("<span style="color:#2c6e9e;">Hello World</span>")</span>
            <span>🎯 <i>fmt.Println</i>("<span style="color:#2c6e9e;">Hello World</span>")</span>
        </div>

        <!-- 底部简约但充满细节的注脚 -->
        <div class="footer-note">
            <p>✨ 从经典出发 · 创造无限可能 ✨</p>
            <p>🌱 <span class="heart">❤️</span> 你好，世界 2026</p>
        </div>
    </div>
</body>
</html>
